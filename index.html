<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Love Letter Preview</title>
    <style>
        :root { --bg: #131215; --card: #1c1a1f; --txt: #ffffff; --muted: #79767e; --pink: #f472b6; --top-bar: #1c1a22; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        body { background: var(--bg); color: var(--txt); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Accurate Top Toolbar Layer */
        .top-navbar { display: flex; align-items: center; justify-content: space-between; background: var(--top-bar); padding: 12px 24px; border-bottom: 1px solid #25232a; }
        .nav-left-pill { background: #2a2233; border: 1px solid #423054; padding: 6px 14px; border-radius: 20px; color: #f472b6; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .nav-right-controls { display: flex; gap: 10px; align-items: center; }
        .circle-btn { width: 34px; height: 34px; background: #252329; border: 1px solid #322f38; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; }
        .circle-btn.active { background: #f472b6; color: #fff; border-color: #f472b6; }

        /* Main Center Workspace Canvas */
        .workspace { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; }

        /* Immersive Dark Sealed Envelope Card UI */
        .envelope-outer { background: #1c1922; border: 1px solid #2d2636; border-radius: 20px; width: 100%; max-width: 320px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); text-align: center; cursor: pointer; transition: transform 0.3s ease; }
        .envelope-outer:hover { transform: translateY(-4px); }

        .wax-seal { width: 30px; height: 30px; background: var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: #fff; box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); margin-bottom: 20px; animation: glowPulse 2s infinite; }
        @keyframes glowPulse { 0% { box-shadow: 0 0 10px rgba(244,114,182,0.4); } 50% { box-shadow: 0 0 22px rgba(244,114,182,0.7); } 100% { box-shadow: 0 0 10px rgba(244,114,182,0.4); } }

        .envelope-label { font-size: 0.8rem; color: var(--muted); margin: 4px 0; }
        .envelope-value { font-size: 0.9rem; color: #d1ced6; margin-bottom: 12px; font-weight: 500; }

        /* Tap Invitation Graphics below Envelope */
        .interaction-hint { margin-top: 25px; text-align: center; }
        .hint-icon { font-size: 1.4rem; color: var(--muted); animation: floatIndicator 1.8s ease-in-out infinite alternate; }
        .hint-text { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.5px; margin-top: 5px; }

        @keyframes floatIndicator { 0% { transform: translateY(0); } 100% { transform: translateY(6px); } }
    </style>
</head>
<body>

    <!-- Upper Creation Ribbon Context Layout -->
    <div class="top-navbar">
        <div class="nav-left-pill">
            <span style="font-size: 0.8rem;">❤️</span> Love Letter
        </div>
        <div class="nav-right-controls">
            <!-- Simulated Active Status Device Indicators -->
            <div class="circle-btn active">📱</div>
            <div class="circle-btn">💻</div>
            <div class="circle-btn">🔄</div>
            <div class="circle-btn">⤢</div>
        </div>
    </div>

    <!-- Centered Stage Canvas Area -->
    <div class="workspace">
        
        <!-- Interactive Letter Envelope Target Element -->
        <div class="envelope-outer" onclick="openLetterPackage()">
            <div class="wax-seal">✦</div>
            
            <div class="envelope-label">To:</div>
            <div class="envelope-value" id="toName">Amigo</div>
            
            <div class="envelope-label">From:</div>
            <div class="envelope-value" id="fromName">Me</div>
        </div>

        <!-- Dynamic Tap indicator labels -->
        <div class="interaction-hint">
            <div class="hint-icon">☝️</div>
            <div class="hint-text">Tap to open</div>
        </div>

    </div>

    <script>
        // Triggered upon clicking the central envelope element block
        function openLetterPackage() {
            alert("Opening your customized live digital letter experience view...");
            // You can replace this alert line with window.location = 'your-part1-url.html' to redirect seamlessly!
        }
    </script>
</body>
</html>
